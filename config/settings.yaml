# Second Bounce — Configuration

# API Endpoints
api:
  espn_scoreboard: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard"
  request_timeout: 10
  retry_attempts: 3
  rate_limit_delay: 0.5  # seconds between requests

# ELO Parameters
elo:
  base_rating: 1500
  k_factor: 20
  # NOTE: This config value is not yet read by engines (they use hardcoded defaults).
  # Actual values in production code:
  #   hybrid_team_player.py: 60 (the main prediction path — what actually runs)
  #   hybrid_predictor.py:   30
  #   team_elo_engine.py:    20
  # Sprint backlog: consolidate all to 60 (calibrated to 54.3% home win rate).
  home_court_advantage: 60
  season_reversion: 0.75   # FiveThirtyEight: 75% prior + 25% mean (1500)

# Data Paths
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  exports: "data/exports"
  config: "config"
  figures: "figures"

# Season Configuration
season:
  current_season_start: "2025-10-01"
  current_season_end: "2026-06-30"
  
# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
